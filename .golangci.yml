version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - gosec
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        # TODO: fix these and re-enable
        - builtinShadow
        - commentedOutCode
        - httpNoBody
        - hugeParam
        - importShadow
        - nestingReduce
        - rangeValCopy
        - unnamedResult
  exclusions:
    paths:
      - api/v1alpha1
