version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gocritic
    - misspell
    - gosec
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
      disabled-checks:
        - commentedOutCode
  exclusions:
    paths:
      - api/v1alpha1
