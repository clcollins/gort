# ServiceMonitor — tells Prometheus Operator to scrape the gort-metrics Service.
# Requires the Prometheus Operator CRDs (monitoring.coreos.com/v1).
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: gort
  namespace: gort-system
  labels:
    app.kubernetes.io/name: gort
    app.kubernetes.io/component: metrics
    # Match the label selector on your Prometheus CR, e.g.:
    #   prometheus: kube-prometheus
    prometheus: kube-prometheus
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: gort
      app.kubernetes.io/component: metrics
  endpoints:
    - port: metrics
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
