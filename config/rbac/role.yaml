apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: gort
  labels:
    app.kubernetes.io/name: gort
    app.kubernetes.io/component: rbac
rules:
  # Core resources — read-only
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - configmaps
      - namespaces
      - services
      - endpoints
    verbs: ["get", "list", "watch"]

  # Apps resources — read-only
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]

  # Autoscaling / policy — read-only
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]

  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]

  # Flux Kustomize controller — read-only
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs: ["get", "list", "watch"]

  # Flux Source controller — read-only
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - helmrepositories
      - ocirepositories
      - buckets
    verbs: ["get", "list", "watch"]

  # Flux Helm controller — read-only
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs: ["get", "list", "watch"]

  # GORT CRD — read GitOpsWatcher, update its status
  - apiGroups: ["gitops.gort.io"]
    resources:
      - gitopswatchers
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gitops.gort.io"]
    resources:
      - gitopswatchers/status
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: gort
  labels:
    app.kubernetes.io/name: gort
    app.kubernetes.io/component: rbac
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gort
subjects:
  - kind: ServiceAccount
    name: gort
    namespace: gort-system
