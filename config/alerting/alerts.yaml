apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: gort-alerts
  namespace: gort-system
  labels:
    app.kubernetes.io/name: gort
    app.kubernetes.io/component: alerting
    # Include this label if your Prometheus Operator selects rules by it:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    # ── Flux reconciliation failures ──────────────────────────────────────────
    - name: gort.flux
      rules:
        - alert: FluxReconcileFailed
          expr: increase(gort_reconcile_polls_total{result="failure"}[5m]) > 0
          for: 0m
          labels:
            severity: critical
          annotations:
            summary: "Flux reconciliation failed for {{ $labels.watcher }}"
            description: >
              GORT detected a Flux reconciliation failure for watcher {{ $labels.watcher }}.
              A fix PR may have been opened. Check the GORT logs and the target repository
              for an auto-generated PR.
            runbook_url: "https://github.com/clcollins/gort/docs/runbooks/flux-reconcile-failed.md"

        - alert: FluxReconcileTimeout
          expr: increase(gort_reconcile_polls_total{result="timeout"}[10m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Flux reconciliation timed out for {{ $labels.watcher }}"
            description: >
              GORT waited for Flux reconciliation of {{ $labels.watcher }} but it did not
              complete within the configured timeout. Investigate the Flux controllers and
              the target Kustomization or HelmRelease.

    # ── Resource deployment failures ──────────────────────────────────────────
    - name: gort.resources
      rules:
        - alert: ResourceDeploymentFailed
          expr: increase(gort_fix_prs_opened_total{reason="flux_failure"}[5m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "GORT opened a fix PR for failed deployment: {{ $labels.watcher }}"
            description: >
              A Flux reconciliation failure for {{ $labels.watcher }} caused GORT to
              open an auto-fix pull request. Review and merge the PR if the fix is correct.

        - alert: FixPRCreationFailed
          expr: increase(gort_fix_prs_failed_total[5m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "GORT failed to create a fix PR for {{ $labels.watcher }}"
            description: >
              GORT attempted to open a fix PR for {{ $labels.watcher }} (reason: {{ $labels.reason }})
              but the GitHub API call failed. Check GORT pod logs for details.

    # ── Intent validation failures ─────────────────────────────────────────────
    - name: gort.intent
      rules:
        - alert: IntentNotMet
          expr: increase(gort_intent_validation_total{result="not_met"}[5m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Deployed state does not match declared intent for {{ $labels.watcher }}"
            description: >
              Flux reconciliation succeeded for {{ $labels.watcher }}, but GORT determined
              the running environment does not satisfy the declared intent in the plan documents.
              An auto-fix PR may have been opened. Review it carefully before merging.

        - alert: IntentValidationError
          expr: increase(gort_intent_validation_total{result="error"}[5m]) > 0
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "GORT intent validation error for {{ $labels.watcher }}"
            description: >
              GORT encountered an error calling the AI API for intent validation of
              {{ $labels.watcher }}. Check GORT pod logs and verify the Claude API key is valid.
