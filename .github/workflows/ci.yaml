name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── Go checks ────────────────────────────────────────────────────────────────
  go-checks:
    name: Go checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify go.mod is tidy
        run: make tidy-check

      - name: gofmt
        run: make fmt

      - name: go vet
        run: make vet

      - name: go test with coverage
        run: make cover

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: true

      - name: golangci-lint
        run: make lint

  # ── Docs check ───────────────────────────────────────────────────────────────
  docs-check:
    name: Plan document required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for plan document in docs/plans/
        run: make docs-check

  # ── Markdown lint ─────────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        run: make markdown-lint

  # ── Makefile lint ─────────────────────────────────────────────────────────────
  makefile-lint:
    name: Makefile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go (for checkmake install)
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run checkmake
        run: make makefile-lint

  # ── Container image build ─────────────────────────────────────────────────────
  image-build:
    name: Container image build
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: quay.io/chcollin/gort
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container image
        run: |
          podman build -f Containerfile \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg VCS_REF=$(git rev-parse HEAD) \
            --build-arg VERSION=ci \
            -t ${{ env.IMAGE_NAME }}:ci .

      - name: Validate OCI labels
        run: |
          echo "Checking OCI labels..."
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.title"}}' | grep -q "gort"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' | grep -q "$(git rev-parse HEAD)"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.version"}}' | grep -q "ci"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "is.collins.cluster.build.commit.id"}}' | grep -q "$(git rev-parse HEAD)"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "io.k8s.display-name"}}' | grep -q "gort"
          echo "All OCI labels validated successfully."
