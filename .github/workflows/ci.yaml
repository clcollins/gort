name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CI_IMAGE: gort-ci:local

jobs:
  # ── CI Container Build ──────────────────────────────────────────────────────
  ci-build:
    name: CI Container Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build CI container image
        run: make ci-build

      - name: Save CI container image
        run: podman save ${{ env.CI_IMAGE }} -o ci-image.tar

      - name: Upload CI container image
        uses: actions/upload-artifact@v4
        with:
          name: ci-image
          path: ci-image.tar
          retention-days: 1

  # ── Go checks (native runner — need race detector and coverage upload) ──────
  tidy-check:
    name: Go Tidy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify go.mod is tidy
        run: make tidy-check

  fmt:
    name: Go Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: make fmt

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run go vet
        run: make vet

  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests with coverage
        run: make cover
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: true

  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3

  build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binary
        run: make build
      - name: Verify binary runs
        run: ./bin/gort --help

  # ── Containerized lint checks (run inside CI container) ─────────────────────
  docs-check:
    name: Plan document required
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
      - name: Load CI image
        run: podman load -i ci-image.tar
      - name: Check for plan documents
        run: podman run --rm -v "$(pwd):/src:Z" -w /src ${{ env.CI_IMAGE }} make docs-check

  markdown-lint:
    name: Markdown lint
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
      - name: Load CI image
        run: podman load -i ci-image.tar
      - name: Run markdownlint-cli2
        run: podman run --rm -v "$(pwd):/src:Z" -w /src ${{ env.CI_IMAGE }} make markdown-lint

  yaml-lint:
    name: YAML lint
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
      - name: Load CI image
        run: podman load -i ci-image.tar
      - name: Lint YAML files
        run: podman run --rm -v "$(pwd):/src:Z" -w /src ${{ env.CI_IMAGE }} make yaml-lint

  makefile-lint:
    name: Makefile lint
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
      - name: Load CI image
        run: podman load -i ci-image.tar
      - name: Run checkmake
        run: podman run --rm -v "$(pwd):/src:Z" -w /src ${{ env.CI_IMAGE }} make makefile-lint

  prometheus-rules:
    name: Prometheus rule validation
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
      - name: Load CI image
        run: podman load -i ci-image.tar
      - name: Validate Prometheus alerting rules
        run: podman run --rm -v "$(pwd):/src:Z" -w /src ${{ env.CI_IMAGE }} make promrules-check

  containerfile-check:
    name: Containerfile tag check
    needs: ci-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ci-image
      - name: Load CI image
        run: podman load -i ci-image.tar
      - name: Check Containerfile base image tags
        run: podman run --rm -v "$(pwd):/src:Z" -w /src ${{ env.CI_IMAGE }} make containerfile-check

  # ── Container image build (host runner — needs container engine) ────────────
  image-build:
    name: Container image build
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: quay.io/clcollins/gort
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container image
        run: |
          podman build -f Containerfile \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg VCS_REF=$(git rev-parse HEAD) \
            --build-arg VERSION=ci \
            -t ${{ env.IMAGE_NAME }}:ci .

      - name: Validate OCI labels
        run: |
          echo "Checking OCI labels..."
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.title"}}' | grep -q "gort"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' | grep -q "$(git rev-parse HEAD)"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.version"}}' | grep -q "ci"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "is.collins.cluster.build.commit.id"}}' | grep -q "$(git rev-parse HEAD)"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "io.k8s.display-name"}}' | grep -q "gort"
          echo "All OCI labels validated successfully."

      - name: Validate image runs
        run: podman run --rm ${{ env.IMAGE_NAME }}:ci --help
