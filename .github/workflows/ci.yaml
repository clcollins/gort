name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # ── Go checks ────────────────────────────────────────────────────────────────
  tidy-check:
    name: Go Tidy Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify go.mod is tidy
        run: make tidy-check

  fmt:
    name: Go Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: make fmt

  vet:
    name: Go Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run go vet
        run: make vet

  test:
    name: Go Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run tests with coverage
        run: make cover
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: true

  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.11.3

  build:
    name: Go Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build binary
        run: make build
      - name: Verify binary runs
        run: ./bin/gort --help

  # ── Docs check ───────────────────────────────────────────────────────────────
  docs-check:
    name: Plan document required
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check for plan document in docs/plans/
        run: make docs-check

  # ── Markdown lint ─────────────────────────────────────────────────────────────
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run markdownlint-cli2
        run: make markdown-lint

  # ── YAML lint ─────────────────────────────────────────────────────────────────
  yaml-lint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: python3 -m pip install --break-system-packages yamllint
      - name: Lint YAML files
        run: make yaml-lint

  # ── Makefile lint ─────────────────────────────────────────────────────────────
  makefile-lint:
    name: Makefile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Run checkmake
        run: make makefile-lint

  # ── Prometheus rules ──────────────────────────────────────────────────────────
  prometheus-rules:
    name: Prometheus rule validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate Prometheus alerting rules
        run: make promrules-check

  # ── Containerfile check ───────────────────────────────────────────────────────
  containerfile-check:
    name: Containerfile tag check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Containerfile base image tags
        run: make containerfile-check

  # ── Container image build ─────────────────────────────────────────────────────
  image-build:
    name: Container image build
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: quay.io/clcollins/gort
    steps:
      - uses: actions/checkout@v4

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Build container image
        run: |
          podman build -f Containerfile \
            --build-arg BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) \
            --build-arg VCS_REF=$(git rev-parse HEAD) \
            --build-arg VERSION=ci \
            -t ${{ env.IMAGE_NAME }}:ci .

      - name: Validate OCI labels
        run: |
          echo "Checking OCI labels..."
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.title"}}' | grep -q "gort"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' | grep -q "$(git rev-parse HEAD)"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "org.opencontainers.image.version"}}' | grep -q "ci"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "is.collins.cluster.build.commit.id"}}' | grep -q "$(git rev-parse HEAD)"
          podman inspect ${{ env.IMAGE_NAME }}:ci --format '{{index .Config.Labels "io.k8s.display-name"}}' | grep -q "gort"
          echo "All OCI labels validated successfully."

      - name: Validate image runs
        run: podman run --rm ${{ env.IMAGE_NAME }}:ci --help
